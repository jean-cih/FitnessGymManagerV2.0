name: .NET Core Desktop CI

on:
  push:
    branches: [ "develop" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        configuration: [Debug, Release]

    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Setup NuGet
      uses: NuGet/setup-nuget@v2

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Restore NuGet packages
      run: |
        nuget sources Add -Name nuget.org -Source https://api.nuget.org/v3/index.json
        nuget restore GymApplicationV2.0.sln -PackagesDirectory packages -NonInteractive

    - name: Build the solution
      run: msbuild GymApplicationV2.0.sln /p:Configuration=${{ matrix.configuration }} /p:RestorePackages=false

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.configuration }}
        path: bin/${{ matrix.configuration }}

    - name: Archive Debug Build
      if: startsWith(github.ref, 'refs/tags/v') && matrix.configuration == 'Debug'
      run: Compress-Archive -Path bin/Debug/* -DestinationPath GymApplication-${{ github.ref_name }}.zip

    - name: Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/v') && matrix.configuration == 'Debug'
      uses: softprops/action-gh-release@v2
      with:
        files: GymApplication-${{ github.ref_name }}.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
